name: Evening Frontend Sync

on:
  schedule:
    # Wakes up at 10:45 AM and 11:45 AM UTC 
    # This corresponds to 6:45 PM and 7:45 PM Singapore Time
    - cron: '45 10,11 * * *'
  workflow_dispatch:

jobs:
  frontend-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4 

      - name: Frontend Dev Logic
        run: |
          # 35% skip rate to maintain organic irregularity
          if [ $((RANDOM % 100)) -lt 35 ]; then
            echo "Heading out for dinner. Skipping this window."
            exit 0
          fi

          git config --global user.name "jem005858"
          git config --global user.email "jem005858@gmail.com"

          # Frontend/JavaScript flavored commit messages
          MESSAGES=(
            "refactor: optimize event listener functions"
            "fix: resolve null pointer exception in utility handler"
            "style: clean up console logs and comments"
            "feat: extend array helper methods"
            "chore: update package dependency hashes"
          )
          
          MSG=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}

          # Appending valid JavaScript comments to a script file
          echo "// Active session token: $RANDOM" >> app.js
          echo "console.log('Node status verified');" >> app.js

          git add app.js
          git commit -m "$MSG"
          git push
